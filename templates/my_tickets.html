<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>我的工单 - 衡阳燃气</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        h1 { font-size: 20px; color: #19c37d; margin-bottom: 16px; }
        .back { color: #888; text-decoration: none; font-size: 13px; display: inline-block; margin-bottom: 16px; }
        .card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .card .id { font-family: monospace; font-size: 12px; color: #888; margin-bottom: 6px; }
        .card .q { font-size: 15px; margin-bottom: 8px; }
        .card .meta { font-size: 12px; color: #888; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 6px; }
        .tag-processing { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .tag-resolved { background: rgba(25,195,125,0.2); color: #19c37d; }
        .empty { text-align: center; color: #888; padding: 60px 20px; }
        .empty .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <h1>我的工单</h1>
    <a class="back" href="/">← 返回聊天</a>

    {% if tickets %}
        {% for t in tickets|reverse %}
        <div class="card">
            <div class="id">{{ t.get('工单ID', '') }}</div>
            <div class="q">{{ t.get('用户问题', '') }}</div>
            <div class="meta">
                <span class="tag {{ 'tag-resolved' if t.get('状态') == '已解决' else 'tag-processing' }}">{{ t.get('状态', '处理中') }}</span>
                {{ t.get('时间', '') }}
            </div>
        </div>
        {% endfor %}
    {% else %}
    <div class="empty">
        <div class="icon">📋</div>
        <p>暂无工单记录</p>
    </div>
    {% endif %}
</body>
</html>
