<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>衡阳燃气 AI 客服</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新对话
            </button>
        </div>
        <div class="sidebar-history" id="historyList">
            <div class="sidebar-history-empty">暂无历史对话</div>
        </div>
        <div class="sidebar-footer">
            <a href="/my-tickets" class="my-tickets-link">📋 我的工单</a>
            <div class="sidebar-info">
                <span class="sidebar-title">衡阳燃气 AI 客服</span>
                <span class="sidebar-subtitle">DeepSeek 驱动</span>
            </div>
        </div>
    </aside>

    <!-- 主聊天区域 -->
    <main class="chat-main">
        <!-- 顶部栏 + 状态胶囊 -->
        <header class="chat-header">
            <button class="toggle-sidebar-btn" id="toggleSidebar" title="切换侧边栏">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </button>
            <div class="status-bar" id="statusBar">
                <span class="status-capsule online">
                    <span class="dot"></span>AI 在线
                </span>
                <span class="status-capsule model">
                    <span class="dot"></span>DeepSeek
                </span>
                <span class="status-capsule kb">
                    <span class="dot"></span>知识库 1009 条
                </span>
                <span class="status-capsule response">
                    <span class="dot"></span>响应正常
                </span>
            </div>
            <div class="header-info">
                <span class="header-title">衡阳燃气 AI 客服</span>
                <span class="header-status">在线服务中</span>
            </div>
            <a href="/my-tickets" class="mobile-tickets-link">📋</a>
        </header>

        <!-- 消息列表 -->
        <div class="chat-messages" id="chatMessages">
            <!-- 欢迎页 -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-logo">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <h2>衡阳燃气 AI 客服</h2>
                <p class="welcome-subtitle">智能燃气安全服务助手</p>

                <div class="quick-entry-grid">
                    <button class="quick-entry-card accent-kaihu suggestion-btn" data-msg="如何办理燃气开户？">
                        <span class="entry-icon">📋</span>
                        <span class="entry-label">办理开户</span>
                    </button>
                    <button class="quick-entry-card accent-jiaofei suggestion-btn" data-msg="燃气费怎么缴纳？收费标准是什么？">
                        <span class="entry-icon">💰</span>
                        <span class="entry-label">燃气缴费</span>
                    </button>
                    <button class="quick-entry-card accent-xielou suggestion-btn" data-msg="闻到煤气味怎么办？是否泄漏？">
                        <span class="entry-icon">🔥</span>
                        <span class="entry-label">燃气泄漏</span>
                    </button>
                    <button class="quick-entry-card accent-guzhang suggestion-btn" data-msg="燃气灶打不着火怎么排查？">
                        <span class="entry-icon">🔧</span>
                        <span class="entry-label">灶具故障</span>
                    </button>
                    <button class="quick-entry-card accent-guifan suggestion-btn" data-msg="燃气使用有哪些安全规范？">
                        <span class="entry-icon">📖</span>
                        <span class="entry-label">安全规范</span>
                    </button>
                    <button class="quick-entry-card accent-rengong suggestion-btn" data-msg="转人工客服">
                        <span class="entry-icon">👤</span>
                        <span class="entry-label">人工服务</span>
                    </button>
                </div>

                <div class="system-status" id="systemStatus">
                    <div class="status-card">
                        <div class="status-card-value" id="statConsult">--</div>
                        <div class="status-card-label">今日咨询</div>
                    </div>
                    <div class="status-card">
                        <div class="status-card-value" id="statRisk">--</div>
                        <div class="status-card-label">已处理风险</div>
                    </div>
                    <div class="status-card">
                        <div class="status-card-value" id="statRate">98%</div>
                        <div class="status-card-label">AI 响应率</div>
                    </div>
                    <div class="status-card">
                        <div class="status-card-value" id="statQueue">--</div>
                        <div class="status-card-label">人工排队</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
            <p class="ai-first-hint"><span class="hint-dot"></span> AI 客服优先接待 · 人工客服当前繁忙 <span class="hint-dot"></span></p>
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    class="message-input"
                    placeholder="输入您的问题，Enter 发送，Shift+Enter 换行"
                    rows="1"
                    autofocus
                ></textarea>
                <button class="transfer-btn" id="transferBtn" title="转人工客服">
                    转人工
                </button>
                <button class="send-btn" id="sendBtn" title="发送消息">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
            <p class="input-hint">紧急情况请拨打 24 小时抢修电话：0734-8677777</p>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
